<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Eyes On You</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app-container">
    <video id="camera-feed" playsinline muted autoplay></video>
    <canvas id="viz-canvas"></canvas>

    <!-- Photo album strip (right side) -->
    <div id="album"></div>

    <div id="ui-overlay">
      <!-- Tap to begin overlay -->
      <div id="tap-to-begin">
        <span>tap to begin</span>
      </div>

      <!-- Controls bar -->
      <div id="controls-bar">
        <button id="btn-mic" class="ctrl-btn" title="Microphone" aria-label="Toggle microphone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>

        <label id="btn-file" class="ctrl-btn" title="Upload audio" aria-label="Upload audio file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          <input type="file" id="file-input" accept="audio/*" style="display:none" />
        </label>

        <!-- Camera capture button -->
        <button id="btn-capture" class="ctrl-btn" title="Take photo" aria-label="Take photo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>

        <button id="btn-flip" class="ctrl-btn" title="Flip camera" aria-label="Flip camera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 7h-9"/>
            <path d="M14 17H5"/>
            <circle cx="17" cy="17" r="3"/>
            <circle cx="7" cy="7" r="3"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Hidden audio element for file playback -->
  <audio id="audio-player" style="display:none"></audio>

  <script type="module" src="js/app.js"></script>
</body>
</html>
